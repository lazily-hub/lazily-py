name: wheels

# Build the mypyc-compiled wheel matrix for every supported platform and
# publish to PyPI. mypyc compiles the reactive core (slot/cell/signal/effect/
# batch) per {Linux x manylinux/musllinux, macOS, Windows} x {cp312, cp313,
# cp314} x {x86_64, arm64}. setup.py falls back to pure Python only if the
# toolchain is unavailable on a target (never expected in CI).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/wheels.yml
      - pyproject.toml
      - setup.py

permissions:
  contents: read

jobs:
  build:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # Build each Linux arch on its native runner (x86_64 on ubuntu-latest,
      # aarch64 on ubuntu-24.04-arm) instead of QEMU-emulating — much faster
      # and avoids duplicate aarch64 wheels.
      CIBW_ARCHS_LINUX: native
      # Cross-compile both macOS arches from the Apple Silicon runner so we
      # don't depend on the deprecated/scarce Intel macos-13 runners.
      CIBW_ARCHS_MACOS: "x86_64 arm64"
    strategy:
      fail-fast: false
      matrix:
        # macos-14 (Apple Silicon) builds both arm64 + x86_64 (cross-compiled).
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build --sdist --outdir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: wheelhouse/*.tar.gz

  publish:
    needs: [build, build-sdist]
    runs-on: ubuntu-latest
    # Only publish on tag pushes (releases). PR / dispatch builds are
    # artifact-only so they can be inspected before publishing.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/lazily
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
